<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KAI — Kabbalah Always Illuminates</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:#0b0b0b;
color:#fff;
margin:0;
padding:0;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

h1{
font-size:34px;
letter-spacing:2px;
margin-bottom:5px;
}

.subtitle{
opacity:.7;
margin-bottom:20px;
}

.card{
background:#171717;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

label{
display:block;
margin-bottom:6px;
}

input[type=range]{
width:100%;
}

.button{
background:#fff;
color:#000;
padding:12px;
border-radius:8px;
text-align:center;
cursor:pointer;
margin-top:10px;
}

.button:hover{
opacity:.9;
}

.tools{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.tool{
background:#222;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.tool:hover{
background:#333;
}

.output{
margin-top:10px;
opacity:.85;
}

textarea{
width:100%;
background:#111;
color:#fff;
border:1px solid #333;
border-radius:6px;
padding:10px;
}

.footer{
opacity:.5;
font-size:12px;
margin-top:20px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>KAI</h1>
<div class="subtitle">Kabbalah Always Illuminates</div>

<div class="card">

<h3>State Alignment</h3>

<label>Certainty</label>
<input id="certainty" type="range" min="0" max="100">

<label>Energy</label>
<input id="energy" type="range" min="0" max="100">

</div>

<div class="card">

<h3>Connection Counter</h3>

<div id="connections">0</div>

<div class="button" onclick="addConnection()">
Count Connection
</div>

</div>

<div class="card">

<h3>Spiritual Tools</h3>

<div class="tools">

<div class="tool" onclick="show72()">
72 Names
</div>

<div class="tool" onclick="showZohar()">
Zohar
</div>

<div class="tool" onclick="showGematria()">
Gematria
</div>

</div>

<div class="output" id="toolOutput"></div>

</div>

<div class="card">

<h3>Seal Reflection</h3>

<textarea placeholder="What did you learn today?"></textarea>

</div>

<div class="footer">

Prototype — Testing Daily Spiritual Flow

</div>

</div>

<script>

let connections = 0

function addConnection(){
connections++
document.getElementById("connections").innerText = connections
}

function show72(){

const names = [
"והו – Time Travel",
"ילי – DNA of the Soul",
"סיט – Banishing Negative Energy",
"עלם – Protection",
"מהש – Healing",
"ללה – Dream State",
"אכא – Removing Ego",
"כהת – Angelic Assistance"
]

const random = names[Math.floor(Math.random()*names.length)]

document.getElementById("toolOutput").innerText =
"Today's 72 Name: " + random

}

function showZohar(){

const passages = [
"Every opportunity to share creates a unification of Light and vessel.",
"The Creator sends moments where Light can be revealed through action.",
"Small acts of sharing create spiritual openings in the world."
]

const random = passages[Math.floor(Math.random()*passages.length)]

document.getElementById("toolOutput").innerText =
"Zohar Insight: " + random

}

function showGematria(){

let word = prompt("Enter Hebrew word")

if(!word){return}

const values = {
א:1,ב:2,ג:3,ד:4,ה:5,ו:6,ז:7,ח:8,ט:9,
י:10,כ:20,ל:30,מ:40,נ:50,ס:60,ע:70,
פ:80,צ:90,ק:100,ר:200,ש:300,ת:400
}

let total = 0

for(let letter of word){
total += values[letter] || 0
}

document.getElementById("toolOutput").innerText =
"Gematria: " + total

}

</script>

</body>
</html>
